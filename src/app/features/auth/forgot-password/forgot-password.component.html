<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
  <div class="max-w-md w-full space-y-8">
    <!-- Header -->
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
        Reset your password
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
        Enter your email address and we'll send you instructions to reset your password.
      </p>
    </div>

    <!-- Success Message -->
    @if (successMessage()) {
      <app-alert
        type="success"
        title="Email Sent"
        [message]="successMessage()"
        [closeable]="true"
        (close)="successMessage.set('')">
      </app-alert>
    }

    <!-- Error Message -->
    @if (errorMessage()) {
      <app-alert
        type="error"
        title="Error"
        [message]="errorMessage()"
        [closeable]="true"
        (close)="errorMessage.set('')">
      </app-alert>
    }

    <!-- Forgot Password Form -->
    @if (!emailSent()) {
      <form class="mt-8 space-y-6" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <app-input
          id="email"
          type="email"
          label="Email address"
          placeholder="you@example.com"
          formControlName="email"
          [error]="email?.invalid && email?.touched ? (email?.errors?.['required'] ? 'Email is required' : email?.errors?.['email'] ? 'Please enter a valid email' : '') : ''"
          [required]="true">
        </app-input>

        <app-button
          label="Send reset instructions"
          type="submit"
          variant="primary"
          [fullWidth]="true"
          [loading]="isLoading()"
          [disabled]="isLoading()">
        </app-button>

        <div class="text-center">
          <a routerLink="/auth/login" class="font-medium text-blue-600 dark:text-blue-400 hover:text-blue-500 dark:hover:text-blue-300 focus:outline-none focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-gray-950 focus:ring-blue-500 transition-colors">
            Back to sign in
          </a>
        </div>
      </form>
    } @else {
      <div class="text-center space-y-4">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Didn't receive the email? Check your spam folder or
        </p>
        <button (click)="emailSent.set(false)" class="font-medium text-blue-600 dark:text-blue-400 hover:text-blue-500 dark:hover:text-blue-300 transition-colors">
          try again
        </button>
      </div>
    }
  </div>
</div>
