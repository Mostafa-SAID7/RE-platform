<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
  <div class="max-w-md w-full space-y-8">
    <!-- Header -->
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
        Sign in to your account
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
        Real Estate Analytics & Property Management Platform
      </p>
    </div>

    <!-- Error Message -->
    @if (errorMessage()) {
      <app-alert
        type="error"
        title="Login Failed"
        [message]="errorMessage()"
        [closeable]="true"
        (close)="errorMessage.set('')">
      </app-alert>
    }

    <!-- Login Form -->
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <!-- Email Field -->
        <app-input
          id="email"
          type="email"
          label="Email address"
          placeholder="you@example.com"
          formControlName="email"
          [error]="email?.invalid && email?.touched ? (email?.errors?.['required'] ? 'Email is required' : email?.errors?.['email'] ? 'Please enter a valid email' : '') : ''"
          [required]="true">
        </app-input>

        <!-- Password Field -->
        <app-input
          id="password"
          type="password"
          label="Password"
          placeholder="Enter your password"
          formControlName="password"
          [error]="password?.invalid && password?.touched ? (password?.errors?.['required'] ? 'Password is required' : password?.errors?.['minlength'] ? 'Password must be at least 6 characters' : '') : ''"
          [required]="true">
        </app-input>
      </div>

      <!-- Forgot Password Link -->
      <div class="flex items-center justify-end">
        <div class="text-sm">
          <a routerLink="/auth/forgot-password" class="font-medium text-blue-600 dark:text-blue-400 hover:text-blue-500 dark:hover:text-blue-300 focus:outline-none focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-gray-950 focus:ring-blue-500 transition-colors">
            Forgot your password?
          </a>
        </div>
      </div>

      <!-- Submit Button -->
      <app-button
        label="Sign in"
        type="submit"
        variant="primary"
        [fullWidth]="true"
        [loading]="isLoading()"
        [disabled]="isLoading()">
      </app-button>
    </form>
  </div>
</div>
