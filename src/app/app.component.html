<div class="flex flex-col min-h-screen bg-white dark:bg-gray-950 transition-colors duration-200">
  <!-- Header -->
  <app-header *ngIf="!isAuthPage"></app-header>
  
  <!-- Main Layout: Sidebar + Content -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar (Fixed on mobile, Sticky on desktop) -->
    <app-sidebar *ngIf="!isAuthPage"></app-sidebar>
    
    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto w-full">
      <div class="p-4 md:p-6">
        <router-outlet />
      </div>
    </main>
  </div>
  
  <!-- Footer -->
  <app-footer *ngIf="!isAuthPage"></app-footer>
</div>
